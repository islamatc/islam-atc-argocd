apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myimage-stage
  namespace: argocd
spec:
  project: learning
  source:
    repoURL: https://github.com/islamatc/islam-atc-argocd.git
    targetRevision: main
    path: apps/myimage/overlays/stage
  destination:
    server: https://kubernetes.default.svc
    namespace: myimage-stage
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
