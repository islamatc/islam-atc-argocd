apiVersion: apps/v1
kind: Deployment

metadata:
  name: myimage-deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: myimage
  template:
    metadata:
      labels:
        app: myimage
    spec:
      containers:
      - name: myimage-container
        image: islamatc/myimage:v1.5
        imagePullPolicy: Always
        ports:
        - containerPort: 80